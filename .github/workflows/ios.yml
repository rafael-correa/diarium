name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL publicada do Diarium. Deixe vazio para usar GitHub Pages deste repositório."
        required: false
        default: ""
      bundle_id:
        description: "Bundle identifier do wrapper iOS."
        required: true
        default: "br.com.rafaelcorrea.diarium"

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve app URL
        id: app-url
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.app_url }}" ]; then
            APP_URL="${{ github.event.inputs.app_url }}"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            APP_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          fi

          echo "url=$APP_URL" >> "$GITHUB_OUTPUT"
          echo "Using APP_URL=$APP_URL"

      - name: Create Capacitor wrapper
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p native-build/www
          cp index.html client.js styles.css manifest.webmanifest service-worker.js native-build/www/
          cp -R icons native-build/www/icons

          cd native-build

          cat > package.json <<'JSON'
          {
            "private": true,
            "scripts": {
              "cap": "cap"
            },
            "dependencies": {
              "@capacitor/cli": "^7.0.0",
              "@capacitor/core": "^7.0.0",
              "@capacitor/ios": "^7.0.0"
            }
          }
          JSON

          npm install

          cat > capacitor.config.json <<JSON
          {
            "appId": "${{ github.event.inputs.bundle_id }}",
            "appName": "Diarium",
            "webDir": "www",
            "server": {
              "url": "${{ steps.app-url.outputs.url }}",
              "cleartext": false
            },
            "ios": {
              "contentInset": "always"
            }
          }
          JSON

          npx cap add ios
          npx cap sync ios

      - name: Build unsigned archive
        shell: bash
        run: |
          set -euo pipefail
          cd native-build

          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/Diarium.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          cd native-build

          APP_PATH=$(find build/Diarium.xcarchive/Products/Applications -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in archive"
            exit 1
          fi

          rm -rf Payload Diarium-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/Diarium.app
          zip -qry Diarium-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Diarium-unsigned-ipa
          path: native-build/Diarium-unsigned.ipa
          if-no-files-found: error
